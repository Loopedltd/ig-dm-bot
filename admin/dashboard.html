<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard</title>
  <style>
    :root{
      --bg:#ffffff;
      --panel:#ffffff;
      --panel2:#ffffff;
      --text:#0b1220;
      --muted:#5b667a;

      --line:rgba(15,23,42,.10);
      --line2:rgba(15,23,42,.14);

      --btn:#111827;
      --btnText:#ffffff;

      --btn2:#ffffff;
      --btn2Text:#111827;

      --danger:#b42318;
      --ok:#027a48;
      --warn:#b54708;

      --shadow:0 10px 30px rgba(15,23,42,.08);
      --shadow2:0 0 0 1px rgba(15,23,42,.06) inset;
      --radius:18px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{display:flex;min-height:100vh}

    .side{
      width:240px;
      padding:18px 14px;
      border-right:1px solid var(--line);
      background:linear-gradient(180deg, rgba(15,23,42,.02), rgba(15,23,42,0));
    }

    .brand{
      font-weight:800;
      letter-spacing:.2px;
      margin-bottom:14px;
    }

    .nav a{
      display:block;
      padding:10px 10px;
      border-radius:12px;
      color:var(--muted);
      text-decoration:none;
      margin-bottom:6px;
      border:1px solid transparent;
    }
    .nav a:hover{
      background:rgba(15,23,42,.03);
      border-color:rgba(15,23,42,.06);
      color:var(--text);
    }
    .nav a.active{
      background:rgba(15,23,42,.05);
      border-color:rgba(15,23,42,.08);
      color:var(--text);
    }

    .main{flex:1;padding:18px 18px 40px}

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .title{
      font-size:18px;
      font-weight:800;
    }

    .actions{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn{
      border:1px solid var(--line2);
      border-radius:12px;
      padding:10px 12px;
      font-weight:800;
      cursor:pointer;
      color:var(--btnText);
      background:var(--btn);
      line-height:1;
    }
    .btn:hover{filter:brightness(1.02)}
    .btn:active{transform:translateY(.5px)}
    .btn:disabled{opacity:.65;cursor:not-allowed}

    .btn.secondary{
      background:var(--btn2);
      color:var(--btn2Text);
      border:1px solid var(--line2);
    }

    .btn.danger{
      background:transparent;
      color:var(--danger);
      border:1px solid rgba(180,35,24,.25);
    }
    .btn.danger:hover{background:rgba(180,35,24,.06)}

    .btn.small{
      padding:8px 10px;
      font-size:12px;
      border-radius:10px;
    }

    .grid{display:grid;gap:14px}

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:14px;
      box-shadow:var(--shadow2);
    }

    .card h2{
      margin:0 0 10px;
      font-size:13px;
      color:var(--muted);
      font-weight:800;
      letter-spacing:.2px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
      border-radius:14px;
    }

    th,td{
      padding:10px 10px;
      border-bottom:1px solid var(--line);
      text-align:left;
      font-size:13px;
      color:var(--text);
      vertical-align:middle;
      background:#fff;
    }

    th{
      color:var(--muted);
      font-weight:800;
      font-size:12px;
      background:rgba(15,23,42,.02);
    }

    tr:hover td{background:rgba(15,23,42,.02)}

    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      border:1px solid var(--line);
      color:var(--muted);
      background:rgba(15,23,42,.02);
      font-weight:800;
      white-space:nowrap;
    }
    .pill.ok{
      color:var(--ok);
      border-color:rgba(2,122,72,.25);
      background:rgba(2,122,72,.06);
    }
    .pill.warn{
      color:var(--warn);
      border-color:rgba(181,71,8,.25);
      background:rgba(181,71,8,.06);
    }
    .pill.danger{
      color:var(--danger);
      border-color:rgba(180,35,24,.25);
      background:rgba(180,35,24,.06);
    }

    .muted{color:var(--muted)}
    .err{color:var(--danger);margin-top:10px;white-space:pre-wrap}
    .okText{color:var(--ok);margin-top:10px;white-space:pre-wrap}

    .actionsCell{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .linkBox{
      margin-top:12px;
      padding:10px 12px;
      border-radius:12px;
      border:1px dashed var(--line2);
      background:rgba(15,23,42,.02);
      display:none;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .linkBoxText{
      font-size:12px;
      color:var(--muted);
      word-break:break-all;
      flex:1;
      min-width:180px;
    }

    .modalOverlay{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.40);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9999;
    }
    .modal{
      width:min(920px, 100%);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
    }
    .modal.narrow{
      width:min(560px, 100%);
    }
    .modalHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:14px 14px;
      background:rgba(15,23,42,.02);
      border-bottom:1px solid var(--line);
    }
    .modalTitle{font-weight:900}
    .modalBody{padding:14px}
    .formRow{display:grid;gap:8px;margin-bottom:12px}

    label{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
    }

    input,textarea{
      width:100%;
      background:#fff;
      border:1px solid var(--line2);
      color:var(--text);
      border-radius:12px;
      padding:10px 10px;
      outline:none;
      font-size:13px;
    }
    input:focus,textarea:focus{
      border-color:rgba(17,24,39,.35);
      box-shadow:0 0 0 3px rgba(17,24,39,.08);
    }

    textarea{
      min-height:160px;
      resize:vertical;
    }

    .row2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .modalFoot{
      display:flex;
      justify-content:flex-end;
      gap:8px;
      padding:14px;
      border-top:1px solid var(--line);
      background:rgba(15,23,42,.02);
    }

    @media (max-width: 980px){
      .wrap{display:block}
      .side{
        width:auto;
        border-right:0;
        border-bottom:1px solid var(--line);
      }
      .row2{grid-template-columns:1fr}
      .topbar{flex-direction:column;align-items:flex-start}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="side">
      <div class="brand">Looped</div>
      <nav class="nav">
        <a class="active" href="/admin/dashboard.html">Admin Dashboard</a>
        <a href="/admin/login.html">Login</a>
      </nav>
      <div style="margin-top:14px" class="muted">
        <div class="pill" id="authStatus">Auth: unknown</div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="title">Admin Dashboard</div>
        <div class="actions">
          <button class="btn" id="createClientBtn" type="button">Create Client</button>
          <button class="btn secondary" id="refreshBtn">Refresh</button>
          <button class="btn danger" id="logoutBtn">Logout</button>
        </div>
      </div>

      <div class="grid">
        <section class="card">
          <h2>Clients (coaches)</h2>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Timezone</th>
                <th>Billing</th>
                <th>Created</th>
                <th style="width:420px;">Actions</th>
              </tr>
            </thead>
            <tbody id="clientsBody"></tbody>
          </table>
          <div class="linkBox" id="paymentLinkBox">
            <div class="linkBoxText" id="paymentLinkText"></div>
            <button class="btn secondary small" id="copyPaymentLinkBtn" type="button">Copy link</button>
          </div>
          <div class="okText" id="clientsOk" style="display:none;"></div>
          <div class="err" id="clientsErr"></div>
        </section>

        <section class="card">
          <h2>Leads</h2>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Stage</th>
                <th>Booking sent</th>
                <th>Call completed</th>
                <th>Created</th>
              </tr>
            </thead>
            <tbody id="leadsBody"></tbody>
          </table>
          <div class="err" id="leadsErr"></div>
        </section>
      </div>
    </main>
  </div>

  <div class="modalOverlay" id="editModal">
    <div class="modal">
      <div class="modalHead">
        <div class="modalTitle" id="editTitle">Edit client</div>
        <button class="btn secondary" id="closeModalBtn" type="button">Close</button>
      </div>
      <div class="modalBody">
        <div class="row2">
          <div class="formRow">
            <label>Booking URL</label>
            <input id="bookingUrlInput" placeholder="https://calendly.com/..." />
          </div>
          <div class="formRow">
            <label>Alt Booking URL (optional)</label>
            <input id="bookingUrlAltInput" placeholder="https://..." />
          </div>
        </div>

        <div class="formRow">
          <label>System prompt</label>
          <textarea id="systemPromptInput" placeholder="The coach's DM assistant prompt..."></textarea>
        </div>

        <div class="err" id="editErr"></div>
      </div>
      <div class="modalFoot">
        <button class="btn secondary" id="cancelEditBtn" type="button">Cancel</button>
        <button class="btn" id="saveEditBtn" type="button">Save</button>
      </div>
    </div>
  </div>

  <div class="modalOverlay" id="createClientModal">
    <div class="modal narrow">
      <div class="modalHead">
        <div class="modalTitle">Create client</div>
        <button class="btn secondary" id="closeCreateClientModalBtn" type="button">Close</button>
      </div>
      <div class="modalBody">
        <div class="formRow">
          <label>Client name</label>
          <input id="createClientNameInput" placeholder="e.g. James Binks Coaching" />
        </div>

        <div class="formRow">
          <label>Coach email</label>
          <input id="createClientEmailInput" type="email" placeholder="coach@example.com" />
        </div>

        <div class="formRow">
          <label>Timezone</label>
          <input id="createClientTimezoneInput" placeholder="e.g. Europe/London" />
        </div>

        <div class="err" id="createClientErr"></div>
      </div>
      <div class="modalFoot">
        <button class="btn secondary" id="cancelCreateClientBtn" type="button">Cancel</button>
        <button class="btn" id="saveCreateClientBtn" type="button">Create</button>
      </div>
    </div>
  </div>

  <script src="/admin/admin.js?v=20260410c"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (window.AdminDashboard?.init) AdminDashboard.init();
      else console.error("AdminDashboard not found (admin.js not loaded)");
    });
  </script>
</body>
</html>
