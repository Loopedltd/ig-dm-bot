<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coach Login</title>

    <style>
      :root{
        --bg:#f7f8fb;
        --panel:#ffffff;
        --border:rgba(15,23,42,0.10);
        --border2:rgba(15,23,42,0.14);
        --text:#0f172a;
        --muted:rgba(15,23,42,0.62);
        --primary:#2d6bff;

        --shadow:0 10px 30px rgba(15,23,42,0.06);
        --ring:rgba(45,107,255,0.22);

        --okBg:rgba(2,122,72,0.08);
        --okBorder:rgba(2,122,72,0.18);
        --okText:#027a48;

        --warnBg:rgba(181,71,8,0.08);
        --warnBorder:rgba(181,71,8,0.18);
        --warnText:#b54708;
      }

      body{
        margin:0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:var(--bg);
        color:var(--text);
        display:flex;
        align-items:center;
        justify-content:center;
        min-height:100vh;
        padding:18px;
      }

      .card{
        width:100%;
        max-width:420px;
        background:var(--panel);
        border:1px solid var(--border);
        border-radius:20px;
        padding:26px;
        box-shadow:var(--shadow);
      }

      h1{
        margin:0 0 6px;
        font-size:24px;
        letter-spacing:-0.2px;
      }

      .muted{
        color:var(--muted);
        font-size:14px;
        margin-bottom:16px;
      }

      .notice{
        display:none;
        margin-bottom:14px;
        padding:12px 14px;
        border-radius:14px;
        font-size:13px;
        line-height:1.45;
        border:1px solid transparent;
      }

      .notice.ok{
        display:block;
        background:var(--okBg);
        border-color:var(--okBorder);
        color:var(--okText);
      }

      .notice.warn{
        display:block;
        background:var(--warnBg);
        border-color:var(--warnBorder);
        color:var(--warnText);
      }

      .notice a{
        color:inherit;
        font-weight:700;
      }

      label{
        display:block;
        margin-top:14px;
        font-size:13px;
        font-weight:650;
        color:var(--muted);
      }

      input{
        width:100%;
        margin-top:6px;
        padding:12px;
        border-radius:12px;
        border:1px solid rgba(15,23,42,0.12);
        background:#fff;
        color:var(--text);
        outline:none;
        box-sizing:border-box;
        transition:border-color .12s ease, box-shadow .12s ease;
      }

      input::placeholder{
        color:rgba(15,23,42,0.40);
      }

      input:focus{
        border-color:rgba(45,107,255,0.55);
        box-shadow:0 0 0 4px var(--ring);
      }

      button{
        margin-top:20px;
        width:100%;
        padding:13px;
        border-radius:14px;
        border:1px solid rgba(45,107,255,0.35);
        background:var(--primary);
        color:#fff;
        font-weight:800;
        cursor:pointer;
        box-shadow:0 8px 18px rgba(45,107,255,0.22);
      }

      button:hover{
        filter:brightness(1.02);
      }

      button:active{
        transform:translateY(1px);
      }

      .actions{
        margin-top:14px;
        display:flex;
        flex-direction:column;
        gap:10px;
      }

      .linkBtn{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        width:100%;
        text-decoration:none;
        padding:12px;
        border-radius:14px;
        border:1px solid var(--border2);
        background:#fff;
        color:var(--text);
        font-weight:800;
      }

      .err{
        color:#c0262d;
        margin-top:12px;
        font-size:13px;
        display:none;
        white-space:pre-wrap;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>Coach Login</h1>
      <div class="muted">Log in to customise your assistant.</div>

      <div class="notice" id="notice"></div>

      <a href="/auth/instagram/start" id="igLoginBtn" style="
        display:flex;
        align-items:center;
        justify-content:center;
        gap:10px;
        width:100%;
        padding:13px;
        border-radius:14px;
        border:1px solid rgba(15,23,42,0.14);
        background:#fff;
        color:#0f172a;
        font-weight:800;
        font-size:14px;
        text-decoration:none;
        box-sizing:border-box;
        margin-bottom:14px;
        box-shadow:0 1px 0 rgba(15,23,42,0.04);
        transition:filter .12s;
      " onmouseover="this.style.filter='brightness(0.97)'" onmouseout="this.style.filter=''">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="ig-grad-login" cx="30%" cy="107%" r="150%">
              <stop offset="0%" stop-color="#fdf497"/>
              <stop offset="5%" stop-color="#fdf497"/>
              <stop offset="45%" stop-color="#fd5949"/>
              <stop offset="60%" stop-color="#d6249f"/>
              <stop offset="90%" stop-color="#285AEB"/>
            </radialGradient>
          </defs>
          <rect x="2" y="2" width="20" height="20" rx="6" fill="url(#ig-grad-login)"/>
          <circle cx="12" cy="12" r="4.5" stroke="white" stroke-width="1.8" fill="none"/>
          <circle cx="17" cy="7" r="1.1" fill="white"/>
        </svg>
        Continue with Instagram
      </a>

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <div style="flex:1;height:1px;background:rgba(15,23,42,0.10);"></div>
        <span style="font-size:12px;color:rgba(15,23,42,0.45);font-weight:600;">or</span>
        <div style="flex:1;height:1px;background:rgba(15,23,42,0.10);"></div>
      </div>

      <form id="loginForm">
        <label>Email</label>
        <input id="email" type="email" required />

        <label>Password</label>
        <input id="password" type="password" required />

        <button type="submit">Login</button>
      </form>

      <div class="actions">
<a class="linkBtn" href="/set-password">Set password</a>
      </div>

      <div class="err" id="error"></div>
      <div class="err" id="igError"></div>
    </div>

<script>
  // Inline login handler — runs independently of coach.js to guarantee reliability
  (function () {
    var form = document.getElementById("loginForm");
    if (!form) return;
    form.__wired = true; // prevents coach.js from double-wiring

    var notice = document.getElementById("notice");
    var params = new URLSearchParams(window.location.search);

    if (notice) {
      if (params.get("paid") === "1") {
        notice.className = "notice ok";
        notice.textContent = "Payment received. Your account may need a password setup first. If you haven\u2019t set one yet, use the \u201CSet password\u201D button below.";
      } else if (params.get("password_set") === "1") {
        notice.className = "notice ok";
        notice.textContent = "Password set successfully. You can now log in.";
      } else if (params.get("cancelled") === "1") {
        notice.className = "notice warn";
        notice.textContent = "Payment was cancelled. Complete payment first to access the dashboard.";
      }
    }

    var igErr = params.get("instagram_error");
    if (igErr) {
      var igErrEl = document.getElementById("igError");
      if (igErrEl) { igErrEl.textContent = decodeURIComponent(igErr); igErrEl.style.display = "block"; }
      window.history.replaceState({}, "", window.location.pathname);
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var email = document.getElementById("email").value.trim();
      var password = document.getElementById("password").value;
      var err = document.getElementById("error");
      if (err) err.style.display = "none";

      fetch("/coach/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, password: password }),
      })
        .then(function (r) {
          return r.json().then(function (j) { return { ok: r.ok, j: j }; });
        })
        .then(function (res) {
          if (!res.ok) {
            var msg = res.j && res.j.error === "subscription_inactive"
              ? (res.j.message || "Subscription inactive. Complete payment before logging in.")
              : (res.j && res.j.error || "Login failed");
            if (err) { err.textContent = msg; err.style.display = "block"; }
            return;
          }
          localStorage.setItem("coach_token", res.j.token);
          window.location.href = res.j.setup_complete ? "/dashboard" : "/settings";
        })
        .catch(function () {
          if (err) { err.textContent = "Network error. Please try again."; err.style.display = "block"; }
        });
    });
  })();
</script>
<script src="/coach/coach.js"></script>
  </body>
</html>
