<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set Password</title>

    <style>
      :root{
        --bg:#f7f8fb;
        --panel:#ffffff;
        --border:rgba(15,23,42,0.10);
        --border2:rgba(15,23,42,0.14);
        --text:#0f172a;
        --muted:rgba(15,23,42,0.62);
        --primary:#2d6bff;

        --shadow:0 10px 30px rgba(15,23,42,0.06);
        --ring:rgba(45,107,255,0.22);

        --ok:#027a48;
        --okBg:rgba(2,122,72,0.08);
        --okBorder:rgba(2,122,72,0.18);

        --err:#c0262d;
      }

      body{
        margin:0;
        font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
        background:var(--bg);
        color:var(--text);
        display:flex;
        align-items:center;
        justify-content:center;
        min-height:100vh;
        padding:18px;
      }

      .card{
        width:100%;
        max-width:440px;
        background:var(--panel);
        border:1px solid var(--border);
        border-radius:20px;
        padding:26px;
        box-shadow:var(--shadow);
      }

      h1{
        margin:0 0 6px;
        font-size:24px;
        letter-spacing:-0.2px;
      }

      .muted{
        color:var(--muted);
        font-size:14px;
        margin-bottom:16px;
        line-height:1.45;
      }

      label{
        display:block;
        margin-top:14px;
        font-size:13px;
        font-weight:650;
        color:var(--muted);
      }

      input{
        width:100%;
        margin-top:6px;
        padding:12px;
        border-radius:12px;
        border:1px solid rgba(15,23,42,0.12);
        background:#fff;
        color:var(--text);
        outline:none;
        box-sizing:border-box;
        transition:border-color .12s ease, box-shadow .12s ease;
      }

      input:focus{
        border-color:rgba(45,107,255,0.55);
        box-shadow:0 0 0 4px var(--ring);
      }

      button{
        margin-top:20px;
        width:100%;
        padding:13px;
        border-radius:14px;
        border:1px solid rgba(45,107,255,0.35);
        background:var(--primary);
        color:#fff;
        font-weight:800;
        cursor:pointer;
        box-shadow:0 8px 18px rgba(45,107,255,0.22);
      }

      button:hover{ filter:brightness(1.02); }
      button:active{ transform:translateY(1px); }

      .err{
        color:var(--err);
        margin-top:12px;
        font-size:13px;
        display:none;
        white-space:pre-wrap;
      }

      .ok{
        color:var(--ok);
        background:var(--okBg);
        border:1px solid var(--okBorder);
        margin-top:12px;
        padding:12px 14px;
        border-radius:14px;
        font-size:13px;
        display:none;
      }

      .link{
        display:inline-block;
        margin-top:14px;
        color:var(--muted);
        font-size:13px;
        text-decoration:none;
      }

      .link:hover{
        color:var(--text);
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>Set your password</h1>
      <div class="muted">
        Create your password to access your coach dashboard.
      </div>

      <form id="setPasswordForm">
        <input id="setupToken" type="hidden" />

        <label>New password</label>
        <input id="newPassword" type="password" minlength="8" required />

        <label>Confirm password</label>
        <input id="confirmPassword" type="password" minlength="8" required />

        <button id="setPasswordBtn" type="submit">Set password</button>
      </form>

      <div class="ok" id="setPasswordOk"></div>
      <div class="err" id="setPasswordError"></div>

      <a class="link" href="/coach/login.html">Back to login</a>
    </div>

    <script src="/coach/coach.js"></script>
  </body>
</html>
