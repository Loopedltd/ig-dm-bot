<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Try Looped — Free Demo</title>
  <style>
    :root {
      --bg:      #f7f8fb;
      --panel:   #ffffff;
      --border:  rgba(15,23,42,0.10);
      --border2: rgba(15,23,42,0.14);
      --text:    #0f172a;
      --muted:   rgba(15,23,42,0.55);
      --primary: #2d6bff;
      --ring:    rgba(45,107,255,0.22);
      --shadow:  0 10px 30px rgba(15,23,42,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: var(--shadow);
    }

    .logo {
      font-size: 15px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.2px;
      margin-bottom: 22px;
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 11px 13px;
      border-radius: 12px;
      border: 1px solid var(--border2);
      background: #fff;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.12s, box-shadow 0.12s;
    }

    input::placeholder { color: rgba(15,23,42,0.35); }

    input:focus {
      border-color: rgba(45,107,255,0.55);
      box-shadow: 0 0 0 3px var(--ring);
    }

    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      border-radius: 14px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(45,107,255,0.25);
      transition: filter 0.12s, transform 0.1s;
    }

    .btn:hover  { filter: brightness(1.05); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .err {
      margin-top: 14px;
      padding: 11px 13px;
      border-radius: 12px;
      background: rgba(180,35,24,0.07);
      border: 1px solid rgba(180,35,24,0.2);
      color: #b42318;
      font-size: 13px;
      line-height: 1.45;
      display: none;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Looped</div>
    <h1>Try it for free</h1>
    <p class="sub">Create your account and explore your coach dashboard — no payment needed.</p>

    <form id="demoForm">
      <div class="field">
        <label>Your name</label>
        <input id="name" type="text" placeholder="e.g. James Binks" autocomplete="name" required />
      </div>

      <div class="field">
        <label>Email</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="field">
        <label>Password</label>
        <input id="password" type="password" placeholder="At least 8 characters" autocomplete="new-password" required />
      </div>

      <button class="btn" id="submitBtn" type="submit">Create my account</button>
    </form>

    <div class="err" id="errBox"></div>

    <div class="footer">
      Already have an account? <a href="/coach/login.html">Log in</a>
    </div>
  </div>

  <script>
    document.getElementById('demoForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const btn    = document.getElementById('submitBtn');
      const errBox = document.getElementById('errBox');
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      errBox.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const r = await fetch('/demo/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });

        const j = await r.json().catch(() => ({}));

        if (!r.ok) {
          errBox.textContent = j.error || 'Something went wrong. Please try again.';
          errBox.style.display = 'block';
          return;
        }

        localStorage.setItem('coach_token', j.token);
        window.location.href = '/coach/dashboard.html';
      } catch (err) {
        errBox.textContent = 'Network error. Please check your connection and try again.';
        errBox.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create my account';
      }
    });
  </script>
</body>
</html>
