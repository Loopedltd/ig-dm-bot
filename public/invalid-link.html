<!DOCTYPE html>
<html>
<head>
  <title>Invalid Payment Link</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background:#f7f7f8;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      margin:0;
    }

    .card {
      background:white;
      padding:40px;
      border-radius:12px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      text-align:center;
      max-width:420px;
    }

    h1 {
      font-size:22px;
      margin-bottom:10px;
    }

    p {
      color:#6b7280;
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Invalid or expired payment link</h1>

  <p>
  Please contact the administrator to receive your personalised access link.
  </p>
</div>

</body>
</html>
