<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment cancelled</title>

    <style>
      :root{
        --bg:#f7f8fb;
        --panel:#ffffff;
        --border:rgba(15,23,42,0.10);
        --text:#0f172a;
        --muted:rgba(15,23,42,0.62);
        --warn:#b54708;
        --warnBg:rgba(181,71,8,0.08);
        --warnBorder:rgba(181,71,8,0.18);
        --shadow:0 10px 30px rgba(15,23,42,0.06);
      }

      body{
        margin:0;
        font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
        background:var(--bg);
        color:var(--text);
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:18px;
      }

      .card{
        width:100%;
        max-width:520px;
        background:var(--panel);
        border:1px solid var(--border);
        border-radius:22px;
        padding:28px;
        box-shadow:var(--shadow);
        text-align:center;
      }

      .icon{
        width:56px;
        height:56px;
        border-radius:999px;
        margin:0 auto 14px;
        display:flex;
        align-items:center;
        justify-content:center;
        background:var(--warnBg);
        border:1px solid var(--warnBorder);
        color:var(--warn);
        font-size:28px;
        font-weight:900;
      }

      h1{
        margin:0 0 8px;
        font-size:28px;
        letter-spacing:-0.3px;
      }

      .sub{
        color:var(--muted);
        font-size:14px;
        line-height:1.55;
        margin-bottom:18px;
      }

      .actions{
        display:flex;
        flex-direction:column;
        gap:10px;
        margin-top:8px;
      }

      .btn{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        text-decoration:none;
        padding:12px 16px;
        border-radius:14px;
        font-weight:800;
      }

      .btn.primary{
        background:#2d6bff;
        color:#fff;
        border:1px solid rgba(45,107,255,0.35);
      }

      .btn.secondary{
        background:#fff;
        color:var(--text);
        border:1px solid rgba(15,23,42,0.12);
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="icon">!</div>
      <h1>Payment cancelled</h1>
      <div class="sub">
        Your payment was not completed. You can go back and try again whenever you’re ready.
      </div>

      <div class="actions">
        <a class="btn primary" id="retryBtn" href="/pay.html">Try again</a>
        <a class="btn secondary" href="/coach/login.html">Back to login</a>
      </div>
    </div>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token") || "";
        const retryBtn = document.getElementById("retryBtn");

        if (retryBtn && token) {
          retryBtn.href = `/pay.html?token=${encodeURIComponent(token)}`;
        }
      })();
    </script>
  </body>
</html>
