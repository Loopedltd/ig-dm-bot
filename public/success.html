<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment successful</title>

    <style>
      :root{
        --bg:#f7f8fb;
        --panel:#ffffff;
        --border:rgba(15,23,42,0.10);
        --text:#0f172a;
        --muted:rgba(15,23,42,0.62);
        --ok:#027a48;
        --okBg:rgba(2,122,72,0.08);
        --okBorder:rgba(2,122,72,0.18);
        --shadow:0 10px 30px rgba(15,23,42,0.06);
      }

      body{
        margin:0;
        font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
        background:var(--bg);
        color:var(--text);
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:18px;
      }

      .card{
        width:100%;
        max-width:520px;
        background:var(--panel);
        border:1px solid var(--border);
        border-radius:22px;
        padding:28px;
        box-shadow:var(--shadow);
        text-align:center;
      }

      .icon{
        width:56px;
        height:56px;
        border-radius:999px;
        margin:0 auto 14px;
        display:flex;
        align-items:center;
        justify-content:center;
        background:var(--okBg);
        border:1px solid var(--okBorder);
        color:var(--ok);
        font-size:28px;
        font-weight:900;
      }

      h1{
        margin:0 0 8px;
        font-size:28px;
        letter-spacing:-0.3px;
      }

      .sub{
        color:var(--muted);
        font-size:14px;
        line-height:1.55;
        margin-bottom:16px;
      }

      .note{
        color:var(--muted);
        font-size:13px;
        line-height:1.5;
        margin-top:12px;
      }

      .link{
        display:inline-flex;
        margin-top:16px;
        align-items:center;
        justify-content:center;
        text-decoration:none;
        padding:12px 16px;
        border-radius:14px;
        border:1px solid rgba(15,23,42,0.12);
        background:#fff;
        color:var(--text);
        font-weight:800;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="icon">✓</div>
      <h1>Payment successful</h1>
      <div class="sub">
        Your payment has been received. We’re preparing your account now.
      </div>
      <div class="note" id="statusText">
        Redirecting you to set your password…
      </div>

      <a class="link" href="/set-password.html">Go to set password</a>
    </div>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token") || "";

        setTimeout(() => {
          if (token) {
            window.location.href = `/set-password.html?token=${encodeURIComponent(token)}`;
          } else {
            window.location.href = "/set-password.html";
          }
        }, 1400);
      })();
    </script>
  </body>
</html>
